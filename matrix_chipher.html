<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Cipher</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000500;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #000500;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    <script>
    (function() {
        // === КОНФИГУРАЦИЯ ===
        const FONT_SIZE = 20;
        const BLOCK_SIZE = 10;
        const NUM_BLOCKS = 6;
        const COLS = BLOCK_SIZE * NUM_BLOCKS;
        const ROWS = 30;
        const KEY_ROW = 0;
        
        const FILL_ORDER = [0, 5, 2, 3, 4, 7, 9, 8, 6, 1];
        
        const UPDATE_PROB = 0.12;
        const WAVE_BASE_SPEED = 0.05;
        const FLICKER_FREQ = 0.004;
        const FLICKER_MIN_BRIGHT = 0.65;
        const FLICKER_MAX_BRIGHT = 1.0;
        const WAVE_BOOST = 1.5;
        
        // 🔹 НАСТРОЙКИ ТАЙМИНГА 👇
        const RESTART_DELAY = 10000;        // Общая задержка до перезапуска (мс)
        const GLITCH_LEAD_TIME = 5000;      // За сколько мс до рестарта начинается мерцание
        
        // Параметры глитч-эффекта
        const GLITCH_BASE_FREQ = 2;         // Базовая частота мерцаний в начале (Гц)
        const GLITCH_MAX_FREQ = 20;         // Макс. частота к концу (Гц)
        const GLITCH_BLACKOUT_CHANCE = 0.3; // Шанс полного выключения экрана при срабатывании
        const GLITCH_STRIP_COUNT = 3;       // Количество случайных полос при частичном выключении
        
        // 🔹 ДЛИТЕЛЬНОСТЬ ПРОВАЛОВ (в кадрах @60fps) 👇
        const GLITCH_MIN_DURATION = 1;      // Мин. длительность провала в начале глитча (кадры)
        const GLITCH_MAX_DURATION = 10;     // Макс. длительность провала в конце глитча (кадры)

        // === СОСТОЯНИЕ ===
        let digits = [], active = [], fixedTime = [], keyFixed = [];
        let wavePos = [], waveSpeed = [], flickerOffset = [];
        let frozen = false, fillIdx = 0, lastTs = 0, restartTimer = null;
        
        // 🔹 СОСТОЯНИЕ ГЛИТЧ-ЭФФЕКТА
        let restartStartTime = null;
        let glitchActive = false;
        let blackoutUntil = 0;              // До какого времени (мс) длится текущий провал
        let blackoutType = null;            // 'full' или 'strip'

        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        // === ИНИЦИАЛИЗАЦИЯ ===
        function init() {
            if (restartTimer) {
                clearTimeout(restartTimer);
                restartTimer = null;
            }
            
            digits = Array.from({length: ROWS}, () => Array(COLS).fill('0'));
            active = Array.from({length: ROWS}, () => Array(COLS).fill(true));
            fixedTime = Array(BLOCK_SIZE).fill(null);
            keyFixed = Array(BLOCK_SIZE).fill(false);
            wavePos = Array(COLS).fill(-1);
            waveSpeed = Array.from({length: COLS}, () => 
                WAVE_BASE_SPEED + Math.random() * 0.04);
            flickerOffset = Array.from({length: COLS}, () => Math.random() * 1000);
            
            frozen = false; 
            fillIdx = 0;
            restartStartTime = null;
            glitchActive = false;
            blackoutUntil = 0;
            blackoutType = null;

            for (let r = 0; r < ROWS; r++)
                for (let c = 0; c < COLS; c++)
                    digits[r][c] = String(Math.floor(Math.random() * 10));

            for (let c = 0; c < COLS; c++) 
                active[KEY_ROW][c] = false;
            
            resize();
            requestAnimationFrame(tick);
            fillKeys();
        }

        function resize() {
            canvas.width = COLS * FONT_SIZE;
            canvas.height = ROWS * FONT_SIZE;
            ctx.font = `bold ${FONT_SIZE}px monospace`;
            ctx.textBaseline = 'top';
            ctx.imageSmoothingEnabled = false;
        }

        // === ЦВЕТ ЯЧЕЙКИ ===
        function getColor(c, r, now, isKeyPos, fixedTs) {
            if (isKeyPos && fixedTs !== null) {
                const elapsed = (now - fixedTs) / 1100;
                if (elapsed < 1) {
                    const intensity = 1 - elapsed;
                    const rVal = Math.min(255, 240 + 15 * intensity);
                    const gVal = 255;
                    const bVal = Math.min(255, 240 + 15 * intensity);
                    return `rgb(${rVal},${gVal},${bVal})`;
                }
                return '#9f9';
            }

            // 🔹 ЗАТЕМНЕНИЕ ОБЫЧНЫХ ЯЧЕЕК ВО ВРЕМЯ ГЛИТЧА
            if (glitchActive && restartStartTime) {
                const timeToRestart = RESTART_DELAY - (now - restartStartTime);
                if (timeToRestart <= GLITCH_LEAD_TIME && timeToRestart > 0) {
                    const fade = 1 - (GLITCH_LEAD_TIME - timeToRestart) / GLITCH_LEAD_TIME;
                    return `rgba(0,${Math.floor(80 * (1 - fade))},0,${0.3 + fade * 0.4})`;
                }
            }

            const flick = 0.5 + 0.5 * Math.sin(now * FLICKER_FREQ + flickerOffset[c] + c * 0.25);
            const baseBright = FLICKER_MIN_BRIGHT + flick * (FLICKER_MAX_BRIGHT - FLICKER_MIN_BRIGHT);

            let waveMult = 1;
            if (wavePos[c] >= 0) {
                const waveRow = wavePos[c] * ROWS;
                const dist = Math.abs(r - waveRow);
                if (dist < 3) {
                    waveMult = 1 + (WAVE_BOOST - 1) * (1 - dist / 3);
                }
            }

            const brightness = baseBright * waveMult;
            const green = Math.min(255, Math.floor((145 + Math.random() * 110) * brightness));
            return `rgb(0,${green},0)`;
        }

        // === ГЛИТЧ-ЭФФЕКТ: мерцание и выключения с длительностью ===
        function applyGlitch(now) {
            if (!glitchActive || !restartStartTime) return false;
            
            const elapsed = now - restartStartTime;
            const timeToRestart = RESTART_DELAY - elapsed;
            
            if (timeToRestart > GLITCH_LEAD_TIME) return false;
            if (timeToRestart <= 0) return false;
            
            // 🔹 ПРОВЕРКА: если уже в провале — не прерываем, просто показываем чёрный
            if (now < blackoutUntil) {
                if (blackoutType === 'full') {
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    return true;
                } else if (blackoutType === 'strip') {
                    // Рендерим обычный кадр, но поверх — полосы (они уже «нарисованы» при старте)
                    // Для простоты: просто чёрный экран на время strip-провала тоже
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    return true;
                }
            }
            
            const glitchProgress = 1 - (timeToRestart / GLITCH_LEAD_TIME);
            
            // Частота растёт
            const baseFreq = GLITCH_BASE_FREQ + glitchProgress * (GLITCH_MAX_FREQ - GLITCH_BASE_FREQ);
            const instability = Math.sin(elapsed * 0.007) * 0.4 + Math.random() * 0.6;
            const currentFreq = baseFreq * (0.8 + instability);
            
            const triggerChance = currentFreq / 60;
            
            if (Math.random() < triggerChance) {
                // 🔹 РАСЧЁТ ДЛИТЕЛЬНОСТИ ПРОВАЛА (в кадрах)
                // Интерполяция + случайность ±20%
                const rawDuration = GLITCH_MIN_DURATION + glitchProgress * (GLITCH_MAX_DURATION - GLITCH_MIN_DURATION);
                const jitter = 0.8 + Math.random() * 0.4; // 0.8...1.2
                const durationFrames = Math.floor(rawDuration * jitter);
                const durationMs = durationFrames * (1000 / 60); // ~16.67 мс на кадр
                
                blackoutUntil = now + durationMs;
                
                // 🔹 ТИП ПРОВАЛА
                if (Math.random() < GLITCH_BLACKOUT_CHANCE) {
                    blackoutType = 'full';
                } else {
                    blackoutType = 'strip';
                    // Рисуем полосы один раз при старте провала
                    ctx.fillStyle = '#000';
                    for (let i = 0; i < GLITCH_STRIP_COUNT; i++) {
                        const x = Math.random() * canvas.width;
                        const w = Math.random() * 80 + 15;
                        ctx.fillRect(x, 0, w, canvas.height);
                    }
                    return true;
                }
                
                // Для full-провала сразу заливаем чёрным
                if (blackoutType === 'full') {
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    return true;
                }
            }
            
            return false;
        }

        // === ОТРИСОВКА ===
        function draw(now) {
            const glitched = applyGlitch(now);
            if (glitched) return;
            
            ctx.fillStyle = '#000500';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (!active[r][c]) continue;
                    
                    const posInBlock = c % BLOCK_SIZE;
                    const isKeyCell = (r === KEY_ROW && c < BLOCK_SIZE);
                    const x = c * FONT_SIZE;
                    const y = r * FONT_SIZE;

                    const fixedTs = (isKeyCell && keyFixed[posInBlock]) ? fixedTime[posInBlock] : null;
                    
                    ctx.shadowBlur = (isKeyCell && fixedTs) ? 14 : 3;
                    ctx.shadowColor = '#0f0';
                    ctx.fillStyle = getColor(c, r, now, isKeyCell, fixedTs);
                    ctx.fillText(digits[r][c], x, y);
                }
            }
            ctx.shadowBlur = 0;
        }

        // === ОБНОВЛЕНИЕ ЛОГИКИ ===
        function update(dt, now) {
            if (frozen) return;
            
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (!active[r][c]) continue;
                    
                    const posInBlock = c % BLOCK_SIZE;
                    if (r === KEY_ROW && c < BLOCK_SIZE && keyFixed[posInBlock]) continue;
                    
                    if (Math.random() < UPDATE_PROB * dt) {
                        digits[r][c] = String(Math.floor(Math.random() * 10));
                    }
                }
            }

            for (let c = 0; c < COLS; c++) {
                if (wavePos[c] >= 0) {
                    wavePos[c] += waveSpeed[c] * dt;
                    if (wavePos[c] > 1.3) wavePos[c] = -1;
                }
                if (wavePos[c] < 0 && Math.random() < 0.0015 * dt) {
                    wavePos[c] = -0.25;
                }
            }
        }

        function tick(now) {
            const dt = (now - lastTs) / 16.67 || 1;
            lastTs = now;
            update(dt, now);
            draw(now);
            requestAnimationFrame(tick);
        }

        // === ЗАПОЛНЕНИЕ КЛЮЧЕЙ ===
        async function fillKeys() {
            while (fillIdx < FILL_ORDER.length) {
                const pos = FILL_ORDER[fillIdx++];
                await new Promise(res => setTimeout(res, 900 + Math.random() * 3800));
                if (keyFixed[pos]) continue;

                const keyCol = pos;
                
                digits[KEY_ROW][keyCol] = String(Math.floor(Math.random() * 10));
                fixedTime[pos] = performance.now();
                keyFixed[pos] = true;
                active[KEY_ROW][keyCol] = true;

                for (let block = 0; block < NUM_BLOCKS; block++) {
                    const otherCol = block * BLOCK_SIZE + pos;
                    for (let r = 1; r < ROWS; r++) {
                        active[r][otherCol] = false;
                    }
                }

                wavePos[keyCol] = -0.2;
                
                if (keyFixed.every(x => x)) {
                    frozen = true;
                    
                    restartStartTime = performance.now();
                    
                    restartTimer = setTimeout(() => {
                        init();
                    }, RESTART_DELAY);
                    
                    glitchActive = true;
                    
                    break;
                }
            }
        }

        // === УПРАВЛЕНИЕ КУРСОРОМ ===
        let cursorTimeout;
        canvas.addEventListener('mousemove', () => {
            clearTimeout(cursorTimeout);
            canvas.style.cursor = 'default';
            cursorTimeout = setTimeout(() => {
                canvas.style.cursor = 'none';
            }, 2500);
        });
        canvas.addEventListener('mouseleave', () => {
            clearTimeout(cursorTimeout);
            canvas.style.cursor = 'default';
        });

        window.addEventListener('resize', resize);
        init();
    })();
    </script>
</body>
</html>
